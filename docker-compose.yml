services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stocksync
      POSTGRES_USER: stocksync
      POSTGRES_PASSWORD: stocksync_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocksync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - SHOPIFY_API_KEY=PLACEHOLDER_KEY
      - SHOPIFY_API_SECRET=PLACEHOLDER_SECRET
      - SHOPIFY_WEBHOOK_SECRET=PLACEHOLDER_WEBHOOK_SECRET
      - STRIPE_PUBLIC_KEY=pk_test_placeholder
      - STRIPE_SECRET_KEY=sk_test_placeholder
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder
      - BASE_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - SHOPIFY_API_KEY=PLACEHOLDER_KEY
      - SHOPIFY_API_SECRET=PLACEHOLDER_SECRET
      - SHOPIFY_WEBHOOK_SECRET=PLACEHOLDER_WEBHOOK_SECRET
      - STRIPE_PUBLIC_KEY=pk_test_placeholder
      - STRIPE_SECRET_KEY=sk_test_placeholder
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder
      - BASE_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - STRIPE_PUBLIC_KEY=pk_test_placeholder
      - STRIPE_SECRET_KEY=sk_test_placeholder
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
